# Application
spring.application.name=onboarding-service

# ---- Datasource (PostgreSQL) ----
# Update these values for your environment
#spring.datasource.url=jdbc:postgresql://localhost:5433/onboarding_db
#spring.datasource.username=postgres
#spring.datasource.password=admin

spring.datasource.url=jdbc:postgresql://54.161.229.211:5433/dolphinscheduler?currentSchema=ufcu
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP (connection pool) sensible defaults
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=30000

# ---- JPA / Hibernate ----
# Use validate so Flyway controls schema changes in prod. Change to 'update' only for local dev if needed.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
# Hibernate dialect - compatible with recent PostgreSQL versions
#spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQL10Dialect
# Use Hibernate 6.x compatible naming strategy
#spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
#spring.jpa.properties.hibernate.default_schema=ufcu

# ---- Flyway ----
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
# If you are running against an existing DB and want Flyway to baseline it, enable baseline-on-migrate
spring.flyway.baseline-on-migrate=true

# ---- Logging (optional) ----
logging.level.org.springframework=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
